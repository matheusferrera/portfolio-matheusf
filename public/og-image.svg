      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <style>
      .bg { fill: url(#g); }
      .card { fill: rgba(255,255,255,0.06); }
      .title { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial; font-size:56px; font-weight:700; fill:#fff; }
      .subtitle { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial; font-size:28px; fill:#e6e6f0; }
    </style>
  </defs>

  <rect width="1200" height="630" class="bg" rx="24" />

  <g transform="translate(64,64)">
